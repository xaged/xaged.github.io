<!DOCTYPE html>
<html lang="en">
<head>
    <title>MASTERY</title>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <link rel="icon" type="image/x-icon" href="fav.ico">
    <style>
        @font-face {
            font-family: "Berkeley Mono";
            /* Fixed the font path - make sure this matches your actual directory structure */
            src: url("./font/fonts/BerkeleyMono-Regular.woff2") format('woff2');
            font-display: swap;
            font-weight: normal;
            font-style: normal;
        }

        :root {
            --background-primary: #0F0F0F;
            --background-secondary: #0B0B0B;
            --text-primary: #dbdbdb;
            --border-color: #424242;
            --accent-color: #be0032;
            --donate-button: #ff642d;
        }

        * {
            /* Changed from "Berkeley Mono" to match your original "Regular book" */
            font-family: "Regular book", "Berkeley Mono", monospace;
            text-size-adjust: none;
            font-stretch: normal !important;
            font-optical-sizing: none;
            font-kerning: none !important;
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        /* Rest of the CSS remains the same */
        body {
            background-color: var(--background-primary);
            color: var(--text-primary);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            margin: 0;
            padding: 1rem;
        }

        article {
            width: 768px;
            background-color: var(--background-secondary);
            border: 1px solid var(--border-color);
            padding: 1.125rem;
            padding-top: 0;
        }

        h1 {
            font-size: 2.5rem;
            margin: 1.5rem 0 1.125rem;
            text-transform: uppercase;
        }

        h2 {
            font-size: 2rem;
            margin-top: 4rem;
            margin-bottom: 0;
            text-align: left;
        }

        p {
            font-size: 1.1rem;
            line-height: 1.25;
            margin: 0.5rem 0 1.125rem;
            text-align: justify;
        }

        a {
            color: var(--accent-color);
            word-break: break-all;
            text-decoration: none;
        }

        a:hover {
            text-decoration: underline;
        }

        .donate-btn {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            height: 36px;
            width: 120px;
            margin-top: 1.25rem;
            background: var(--donate-button);
            color: #fff;
            border: 1px solid var(--donate-button);
            text-decoration: none;
            transition: all 0.2s ease;
        }

        .donate-btn:hover {
            background: #000;
            color: #ededed;
            border-color: #ff0000;
            text-decoration: none;
        }

        @media screen and (max-width: 864px) {
            article {
                width: 100%;
            }
        }

        @supports (content-visibility: auto) {
            p, img {
                content-visibility: auto;
                contain-intrinsic-size: 958px 300px;
            }
        }
    </style>
</head>
<body>
    <article>
        <h1>MASTERY</h1>
        
        <p>The world around us is <a href="https://en.wikipedia.org/wiki/Susan_Lindquist#Awards_and_honors">Susan Lindquist</a> more complex than we can possibly imagine. With our limited senses and consciousness, we only glimpse a small portion of reality. Furthermore, everything in the universe is in a state of constant flux .</p>
        
        <p style="padding-top: 6px; border-top: 1px solid var(--border-color)">BEYOND</p>
    </article>
</body>
</html>
