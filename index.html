<!DOCTYPE html><html><head>
	<style>
	@font-face {
  font-family: 'Regular-book-webfont';
  src: url(fonts/Regular-book-webfont.woff2) format('woff2');
}
* {
	font-family:"Regular-book-webfont";
	margin: 0;
	padding: 0;
	box-sizing: border-box;
}

body {
	background: #000;
	display: flex;
	justify-content: center;
	align-items: center;
	height: 100vh;
}

.material {
	position: relative;
	display: flex;
	justify-content: center;
	align-items: center;
	transform-style: preserve-3d;
	transform: rotateZ(-20deg);
}
h1{
	margin-bottom: 4px;
	color: #efefef;
}
p{
	font-size:1.25rem;
}
@keyframes rotate {
	0% {
		transform: rotateX(0deg);
	}
	100% {
		transform: rotateX(360deg);
	}
}

.dna {/*line*/
	position: relative;
    width: 1px;
    height: 100px;
    border: 1px solid #a7a7a7;
    box-shadow: 0 0 5px #e7e7e7;
    background: transparent;
    margin: 0px 10px;
    animation: rotate 3s linear infinite;
}
.dna::before {/*top dot*/
	content: '';
	position: absolute;
	top: -2px;
	left: -5px;
	width: 10px;
	height: 10px;
	background: #000;
	border-radius: 50%;
	border:1px solid #AAA;
	box-shadow: 0 0 4px #AAA;
}
.dna::after {/*bottom dot*/
	content: '';
	position: absolute;
	bottom: -2px;
	left: -5px;
	width: 10px;
	height: 10px;
	background: #000;
	border-radius: 50%;
	border:1px solid #AAA;
	box-shadow: 0 0 4px #AAA;
}

.dna:nth-child(1) {
  animation-delay: -0.15s;
}
.dna:nth-child(2) {
  animation-delay: -0.3s;
}
.dna:nth-child(3) {
  animation-delay: -0.45s;
}
.dna:nth-child(4) {
  animation-delay: -0.6s;
}
.dna:nth-child(5) {
  animation-delay: -0.75s;
}
.dna:nth-child(6) {
  animation-delay: -0.9s;
}
.dna:nth-child(7) {
  animation-delay: -1.05s;
}
.dna:nth-child(8) {
  animation-delay: -1.2s;
}
.dna:nth-child(9) {
  animation-delay: -1.35s;
}
.dna:nth-child(10) {
  animation-delay: -1.5s;
}
.dna:nth-child(11) {
  animation-delay: -1.65s;
}
.dna:nth-child(12) {
  animation-delay: -1.8s;
}
.dna:nth-child(13) {
  animation-delay: -1.95s;
}
.dna:nth-child(14) {
  animation-delay: -2.1s;
}
.dna:nth-child(15) {
  animation-delay: -2.25s;
}
.dna:nth-child(16) {
  animation-delay: -2.3s;
}
.header{
color:#AAA;
margin-right:12px;
}
*{text-transform: none!important;}
	</style>
</head>
<body>
<div class="header">
<h1>Muhammed Saif</h1>

</div></body></html>
